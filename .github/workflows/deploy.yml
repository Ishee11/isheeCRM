name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: appointment-service

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: appointment-service/go.mod

      - name: Run tests
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REF="${REGISTRY}/${IMAGE_OWNER}/isheecrm-appointment-service"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./appointment-service
          file: ./appointment-service/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_ref }}:main

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_REF,IMAGE_TAG,DEPLOY_PATH,REGISTRY_USERNAME,REGISTRY_PASSWORD
          script: |
            set -euo pipefail
            : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
            : "${REGISTRY_USERNAME:?REGISTRY_USERNAME is required}"
            : "${REGISTRY_PASSWORD:?REGISTRY_PASSWORD is required}"
            : "${IMAGE_REF:?IMAGE_REF is required}"
            : "${IMAGE_TAG:?IMAGE_TAG is required}"

            echo "${REGISTRY_PASSWORD}" | docker login ghcr.io -u "${REGISTRY_USERNAME}" --password-stdin

            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            if [ ! -f .env ]; then
              cat > .env.example <<'ENV'
            APP_PORT=8081
            APP_CONTAINER_NAME=appointment-service-app-container
            APP_IMAGE=ghcr.io/ishee11/isheecrm-appointment-service
            IMAGE_TAG=latest

            DB_HOST=postgres
            DB_PORT=5432
            DB_USER=postgres
            DB_PASSWORD=change-me
            DB_NAME=isheecrm

            POSTGRES_IMAGE=postgres:17.6-bookworm
            POSTGRES_CONTAINER_NAME=postgres-container
            POSTGRES_PORT=5433
            POSTGRES_BIND_ADDRESS=127.0.0.1
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=change-me
            POSTGRES_DB=isheecrm
            ENV
              echo ".env is missing in ${DEPLOY_PATH}. Copy .env.example to .env and fill real secrets on the server." >&2
              exit 1
            fi

            cat > docker-compose.yml <<'COMPOSE'
            services:
              postgres:
                image: ${POSTGRES_IMAGE:-postgres:17.6-bookworm}
                container_name: ${POSTGRES_CONTAINER_NAME:-postgres-container}
                restart: unless-stopped
                environment:
                  POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
                  POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
                volumes:
                  - isheecrm_isheecrm_data:/var/lib/postgresql/data
                networks:
                  - appointment-service_app-network
                ports:
                  - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5433}:5432"
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              app:
                image: ${APP_IMAGE:?APP_IMAGE is required}:${IMAGE_TAG:-latest}
                container_name: ${APP_CONTAINER_NAME:-appointment-service-app-container}
                restart: unless-stopped
                environment:
                  APP_PORT: 8080
                  APP_IMAGE: ${APP_IMAGE:?APP_IMAGE is required}
                  IMAGE_TAG: ${IMAGE_TAG:-latest}
                  DB_HOST: ${DB_HOST:-postgres}
                  DB_PORT: ${DB_PORT:-5432}
                  DB_USER: ${DB_USER:?DB_USER is required}
                  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
                  DB_NAME: ${DB_NAME:?DB_NAME is required}
                ports:
                  - "${APP_PORT:-8081}:8080"
                networks:
                  - appointment-service_app-network
                depends_on:
                  postgres:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 10s

            networks:
              appointment-service_app-network:
                driver: bridge

            volumes:
              isheecrm_isheecrm_data:
            COMPOSE

            if grep -q '^APP_IMAGE=' .env; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${IMAGE_REF}|" .env
            else
              echo "APP_IMAGE=${IMAGE_REF}" >> .env
            fi
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi

            docker compose --env-file .env -p appointment-service pull
            docker compose --env-file .env -p appointment-service up -d --remove-orphans
