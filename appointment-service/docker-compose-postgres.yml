services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17.6-bookworm}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-container}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - ${POSTGRES_DATA_DIR:-/var/lib/isheecrm/postgres}:/var/lib/postgresql/data
    networks:
      - appointment-service_app-network
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  appointment-service_app-network:
    external: true
