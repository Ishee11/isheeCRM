services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17.6-bookworm}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-container}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - isheecrm_isheecrm_data:/var/lib/postgresql/data
    networks:
      - appointment-service_app-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}:${IMAGE_TAG:-latest}
    container_name: ${APP_CONTAINER_NAME:-appointment-service-app-container}
    restart: unless-stopped
    environment:
      APP_IMAGE: ${APP_IMAGE:?APP_IMAGE is required}
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - appointment-service_app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  appointment-service_app-network:
    driver: bridge

volumes:
  isheecrm_isheecrm_data:
